<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light">

    <!-- LIGHT THEME FORCE — runs before any CSS loads, prevents dark chrome entirely -->
    <style>
      html { color-scheme: light !important; background-color: #f1f5f9 !important; }
      body { color-scheme: light !important; background-color: #f1f5f9 !important; margin: 0; }
      *, *::before, *::after { color-scheme: inherit !important; }
    </style>

    <!-- Primary Meta Tags -->
    <title>Arjuna Speaks — AI Data Analytics Dashboard</title>
    <meta name="title" content="Arjuna Speaks — AI Data Analytics Dashboard" />
    <meta name="description" content="Upload Excel or CSV files. AI-powered data analysis, KPI detection, and professional dashboard generation. Share insights via Google Drive." />
    <meta name="keywords" content="data analytics, AI dashboard, business intelligence, data visualization, KPI dashboard, Excel analysis" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://arjuna-speaks.vercel.app/" />
    <meta property="og:title" content="Arjuna Speaks — AI Data Analytics Dashboard" />
    <meta property="og:description" content="Upload Excel or CSV. AI-powered analysis, KPIs, and professional dashboard generation." />
    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://arjuna-speaks.vercel.app/" />
    <meta property="twitter:title" content="Arjuna Speaks — AI Data Analytics Dashboard" />
    <meta property="twitter:description" content="Upload Excel or CSV. AI-powered analysis, KPIs, and professional dashboard generation." />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
